<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRS Portal — Sign In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0ebe1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:40px 32px;width:100%;max-width:420px;box-shadow:0 4px 32px rgba(0,0,0,.12)}
.logo{text-align:center;margin-bottom:28px}
.logo img{width:70px;height:70px;border-radius:50%;object-fit:cover;margin-bottom:10px}
.logo h1{font-size:1.1rem;font-weight:700;color:#1a1612}
.logo p{font-size:.75rem;color:#C9960C;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#7a6a5a;margin-bottom:6px}
.field input{width:100%;padding:12px 14px;border:1px solid #ddd5c5;border-bottom:2px solid #C9960C;border-radius:6px 6px 0 0;font-size:.95rem;font-family:inherit;outline:none;background:#faf8f5;color:#1a1612;-webkit-appearance:none}
.field input:focus{border-bottom-color:#a87c08;background:#fff}
.btn{width:100%;padding:14px;background:#C9960C;color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-top:8px;font-family:inherit}
.btn:hover{background:#a87c08}
.btn:disabled{background:#ccc;cursor:not-allowed}
.error{color:#8c1f1f;font-size:.82rem;text-align:center;margin:10px 0;min-height:20px;line-height:1.5;padding:0 4px}
.success{color:#15803d;font-size:.82rem;text-align:center;margin:10px 0}
.divider{text-align:center;color:#aaa;font-size:.8rem;margin:16px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#e0d8cc}
.divider::before{left:0}.divider::after{right:0}
.google-btn{width:100%;padding:12px;background:#fff;border:1.5px solid #ddd5c5;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit;color:#1a1612}
.google-btn:hover{background:#f5f0e8;border-color:#C9960C}
.tab-row{display:flex;margin-bottom:24px;border-bottom:2px solid #e0d8cc}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:.85rem;font-weight:600;color:#9a8a7a;background:none;border:none;font-family:inherit;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab.active{color:#C9960C;border-bottom-color:#C9960C}
.link{color:#C9960C;cursor:pointer;text-decoration:underline;font-size:.8rem;display:block;text-align:center;margin-top:12px;background:none;border:none;font-family:inherit}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.status{text-align:center;padding:30px;color:#7a6a5a;font-size:.85rem}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div style="width:70px;height:70px;border-radius:50%;background:#1a1612;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:1.4rem;font-weight:900;color:#C9960C;letter-spacing:-.02em">CRC</div>
    <h1>Crestville Properties</h1>
    <p>Property Management Portal</p>
  </div>

  <!-- CHECKING AUTH STATE -->
  <div id="stateChecking" class="status">Checking session…</div>

  <!-- LOGIN FORM -->
  <div id="formArea" style="display:none">
    <div class="tab-row">
      <button class="tab active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" id="tabRegister" onclick="switchTab('register')">Register</button>
    </div>

    <!-- SIGN IN -->
    <div id="panelSignIn">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="siEmail" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="siPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doSignIn()"/>
      </div>
      <div class="error" id="siErr"></div>
      <button class="btn" id="siBtn" onclick="doSignIn()">Sign In →</button>
      <button class="link" onclick="doReset()">Forgot password?</button>
      <div class="divider">or</div>
      <button class="google-btn" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- REGISTER -->
    <div id="panelRegister" style="display:none">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Your full name" autocomplete="name"/>
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password (min 6 characters)</label>
        <input type="password" id="regPass" placeholder="••••••••" autocomplete="new-password"/>
      </div>
      <div class="error" id="regErr"></div>
      <button class="btn" id="regBtn" onclick="doRegister()">Create Account →</button>
    </div>
  </div>
</div>

<script>
var API_KEY  = "AIzaSyAiQ7q1qbwx1i_qjVFaTSJIeb9yneMT21U";
var PROJECT  = "solarappform";
var PORTAL   = "https://enjanih-stack.github.io/crestville-portal/index.html";
var AUTH_URL = "https://identitytoolkit.googleapis.com/v1/accounts:";
var ADMINS   = ["enjanih@gmail.com","crestechnologies@outlook.com","crestiton@gmail.com"];

/* ── Session storage ── */
function saveSession(data) {
  var s = JSON.stringify({ idToken:data.idToken, uid:data.localId, email:data.email,
    refreshToken:data.refreshToken, expiry: Date.now() + (parseInt(data.expiresIn||3600)*1000) });
  try { localStorage.setItem("crs_auth", s); } catch(e){}
  try { sessionStorage.setItem("crs_auth", s); } catch(e){}
}

function loadSession() {
  var raw;
  try { raw = localStorage.getItem("crs_auth") || sessionStorage.getItem("crs_auth"); } catch(e){}
  if (!raw) return null;
  try { return JSON.parse(raw); } catch(e){ return null; }
}

function clearSession() {
  try { localStorage.removeItem("crs_auth"); } catch(e){}
  try { sessionStorage.removeItem("crs_auth"); } catch(e){}
}

/* ── Firebase REST post ── */
function post(endpoint, body) {
  return fetch(AUTH_URL + endpoint + "?key=" + API_KEY, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  }).then(function(r) {
    return r.json().then(function(data) {
      if (!r.ok) {
        var msg = (data.error && data.error.message) || "UNKNOWN";
        var code = msg.split(" : ")[0].trim();
        throw new Error(code);
      }
      return data;
    });
  });
}

/* ── Token refresh ── */
function refreshToken(refreshToken) {
  return fetch("https://securetoken.googleapis.com/v1/token?key=" + API_KEY, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: "grant_type=refresh_token&refresh_token=" + encodeURIComponent(refreshToken)
  }).then(function(r) { return r.json(); });
}

/* ── Error messages ── */
function errMsg(code) {
  var map = {
    "INVALID_LOGIN_CREDENTIALS": "Incorrect email or password.",
    "EMAIL_NOT_FOUND":           "No account with this email. Please register.",
    "INVALID_PASSWORD":          "Incorrect password. Try again.",
    "INVALID_EMAIL":             "Invalid email address.",
    "EMAIL_EXISTS":              "Email already registered. Use Sign In.",
    "WEAK_PASSWORD":             "Password must be at least 6 characters.",
    "USER_DISABLED":             "Account disabled. Contact admin.",
    "TOO_MANY_ATTEMPTS_TRY_LATER": "Too many attempts. Wait a few minutes.",
    "NETWORK_ERROR":             "Network error. Check your connection.",
  };
  return map[code] || ("Error: " + code + ". Please try again.");
}

/* ── UI helpers ── */
function setLoading(btnId, errId, loading, msg) {
  var btn = document.getElementById(btnId);
  var err = document.getElementById(errId);
  if (err) err.textContent = "";
  if (btn) {
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span>' + (msg||"Please wait…") : btn.getAttribute("data-label") || btn.textContent;
  }
}

function showErr(errId, msg) {
  var el = document.getElementById(errId);
  if (el) el.textContent = msg;
}

function switchTab(tab) {
  document.getElementById("panelSignIn").style.display    = tab === "signin"   ? "" : "none";
  document.getElementById("panelRegister").style.display  = tab === "register" ? "" : "none";
  document.getElementById("tabSignIn").className   = "tab" + (tab==="signin"  ?" active":"");
  document.getElementById("tabRegister").className = "tab" + (tab==="register"?" active":"");
}

/* ── Go to portal ── */
function goToPortal(email) {
  var isAdmin = ADMINS.indexOf(email.toLowerCase()) >= 0;
  sessionStorage.setItem("crs_from_landing", "1");
  sessionStorage.setItem("crs_login_email", email.toLowerCase());
  window.location.href = PORTAL;
}

/* ── Sign In ── */
function doSignIn() {
  var email = (document.getElementById("siEmail").value || "").trim().toLowerCase();
  var pass  = (document.getElementById("siPass").value  || "");
  if (!email) { showErr("siErr", "Enter your email address."); return; }
  if (!pass)  { showErr("siErr", "Enter your password.");      return; }

  var btn = document.getElementById("siBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';
  showErr("siErr", "");

  post("signInWithPassword", { email:email, password:pass, returnSecureToken:true })
    .then(function(data) {
      saveSession(data);
      goToPortal(data.email);
    })
    .catch(function(e) {
      btn.disabled = false;
      btn.innerHTML = "Sign In →";
      showErr("siErr", errMsg(e.message));
    });
}

/* ── Register ── */
function doRegister() {
  var name  = (document.getElementById("regName").value  || "").trim();
  var email = (document.getElementById("regEmail").value || "").trim().toLowerCase();
  var pass  = (document.getElementById("regPass").value  || "");
  if (!name)        { showErr("regErr", "Enter your full name.");    return; }
  if (!email)       { showErr("regErr", "Enter your email.");        return; }
  if (pass.length < 6) { showErr("regErr", "Password min 6 characters."); return; }

  var btn = document.getElementById("regBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creating account…';
  showErr("regErr", "");

  post("signUp", { email:email, password:pass, returnSecureToken:true })
    .then(function(data) {
      saveSession(data);
      /* Save name to Firestore via REST */
      var uid = data.localId;
      var token = data.idToken;
      return fetch("https://firestore.googleapis.com/v1/projects/" + PROJECT + "/databases/(default)/documents/users/" + uid, {
        method: "PATCH",
        headers: { "Content-Type":"application/json", "Authorization":"Bearer "+token },
        body: JSON.stringify({ fields: {
          name:          { stringValue: name },
          email:         { stringValue: email },
          role:          { stringValue: ADMINS.indexOf(email) >= 0 ? "admin" : "tenant" },
          createdAt:     { stringValue: new Date().toISOString() },
          emailVerified: { booleanValue: false }
        }})
      });
    })
    .then(function() {
      var email2 = document.getElementById("regEmail").value.trim().toLowerCase();
      goToPortal(email2);
    })
    .catch(function(e) {
      btn.disabled = false;
      btn.innerHTML = "Create Account →";
      showErr("regErr", errMsg(e.message));
    });
}

/* ── Google Sign In ── */
function doGoogle() {
  showErr("siErr", "Google sign-in requires the full portal. Redirecting…");
  sessionStorage.setItem("crs_google_signin", "1");
  sessionStorage.setItem("crs_from_landing", "1");
  setTimeout(function() { window.location.href = PORTAL; }, 800);
}

/* ── Password Reset ── */
function doReset() {
  var email = (document.getElementById("siEmail").value || "").trim();
  if (!email) { showErr("siErr", "Enter your email address first."); return; }
  showErr("siErr", "");
  post("sendOobCode", { requestType:"PASSWORD_RESET", email:email })
    .then(function() { showErr("siErr", "✓ Reset email sent! Check your inbox."); document.getElementById("siErr").style.color="#15803d"; })
    .catch(function(e) { showErr("siErr", errMsg(e.message)); });
}

/* ── Check existing session on load ── */
window.addEventListener("load", function() {
  var sess = loadSession();
  if (!sess) {
    document.getElementById("stateChecking").style.display = "none";
    document.getElementById("formArea").style.display = "";
    return;
  }

  /* Token still valid? */
  if (sess.expiry && sess.expiry > Date.now() + 60000) {
    document.getElementById("stateChecking").textContent = "Welcome back! Loading portal…";
    goToPortal(sess.email);
    return;
  }

  /* Token expired — try refresh */
  if (sess.refreshToken) {
    document.getElementById("stateChecking").textContent = "Refreshing session…";
    refreshToken(sess.refreshToken)
      .then(function(data) {
        if (data.id_token) {
          saveSession({ idToken:data.id_token, localId:sess.uid, email:sess.email,
            refreshToken:data.refresh_token||sess.refreshToken, expiresIn:data.expires_in||3600 });
          goToPortal(sess.email);
        } else {
          clearSession();
          document.getElementById("stateChecking").style.display = "none";
          document.getElementById("formArea").style.display = "";
        }
      })
      .catch(function() {
        clearSession();
        document.getElementById("stateChecking").style.display = "none";
        document.getElementById("formArea").style.display = "";
      });
  } else {
    clearSession();
    document.getElementById("stateChecking").style.display = "none";
    document.getElementById("formArea").style.display = "";
  }
});
</script>
</body>
</html>
