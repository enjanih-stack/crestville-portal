<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0908;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#faf8f4;border-radius:16px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #e0d8c8}
.logo{width:52px;height:52px;border-radius:50%;border:2px solid #c9960c;object-fit:cover}
.brand{font-size:1.05rem;font-weight:700;color:#0f0e0c;line-height:1.2}
.brand-sub{font-size:.58rem;color:#c9960c;letter-spacing:.12em;text-transform:uppercase}
.hero{text-align:center;margin-bottom:22px}
.hero-eye{font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#c9960c;margin-bottom:6px}
.hero-h{font-size:1.3rem;font-weight:700;color:#0f0e0c;margin-bottom:4px}
.hero-h span{color:#c9960c}
.hero-sub{font-size:.78rem;color:#8a7a60}
label{display:block;font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#8a7a60;margin-bottom:4px;margin-top:14px}
input{width:100%;padding:11px 13px;border:1px solid #d4ccbe;border-bottom:2px solid #c9960c;border-radius:5px 5px 0 0;font-size:.92rem;background:#fff;color:#0f0e0c;outline:none;font-family:inherit}
input:focus{background:#fffdf5;border-bottom-color:#e8b422}
.msg{font-size:.79rem;margin:10px 0 4px;text-align:center;min-height:20px;line-height:1.5;padding:0 4px}
.msg.err{color:#8c1f1f}
.msg.ok{color:#1a5c2e;background:#f0f7f0;border:1px solid #c8dcc8;border-radius:5px;padding:9px 12px}
.btn{width:100%;padding:13px;border:none;border-radius:7px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:10px;letter-spacing:.06em;font-family:inherit;transition:all .2s}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-gold{background:linear-gradient(135deg,#7a5800,#c9960c,#e8b422,#c9960c);color:#fff;box-shadow:0 4px 16px rgba(201,150,12,.3)}
.btn-gold:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 24px rgba(201,150,12,.4)}
.btn-google{background:#fff;border:1.5px solid #d4ccbe;color:#0f0e0c;display:flex;align-items:center;justify-content:center;gap:10px;font-size:.86rem}
.btn-google:hover{background:#f5f5f5;border-color:#c9960c}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0 4px;font-size:.7rem;color:#8a7a60}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#d4ccbe}
.reset-row{text-align:center;margin-top:12px;padding-top:12px;border-top:1px solid #e0d8c8}
.reset-btn{background:none;border:none;color:#c9960c;cursor:pointer;font-size:.75rem;text-decoration:underline;font-family:inherit}
.footer{text-align:center;margin-top:16px;font-size:.68rem;color:#9a8a6a}
</style>
</head>

      <path fill="#1976D2" d="M43.6 20.2H42V20H24v8h11.3c-.9 2.4-2.5 4.5-4.6 5.9l6.2 5.2C42.5 35.8 44 30.2 44 24c0-1.3-.1-2.6-.4-3.8z"/>
    </svg>
    Continue with Google
  </button>

  <div class="reset-row">
    <button class="reset-btn" onclick="resetPw()">Forgot password? Send reset email to my inbox</button>
  </div>

  <div class="footer">Ojodu &middot; Ibadan &middot; Enugu &nbsp;&bull;&nbsp; RC 1643396</div>
</div>

<script>
const PORTAL = 'https://enjanih-stack.github.io/crestville-portal/index.html';
const msgEl  = document.getElementById('msg');
const loginBtn = document.getElementById('loginBtn');

// If already signed in, go straight to portal
firebase.auth().onAuthStateChanged(user => {
  if (user) {
    setOk('Signed in as ' + user.email + ' — redirecting…');
    setTimeout(() => { window.location.href = PORTAL; }, 1200);
  }
});

function setMsg(text, type) {
  msgEl.textContent = text;
  msgEl.className = 'msg ' + (type || '');
}
function setErr(t) { setMsg(t, 'err'); }
function setOk(t)  { setMsg(t, 'ok'); }

const CODES = {
  'auth/wrong-password':              'Wrong password — use Forgot Password below.',
  'auth/invalid-credential':          'Incorrect email or password — try Forgot Password.',
  'auth/user-not-found':              'No account found with this email.',
  'auth/too-many-requests':           'Too many attempts — please wait a few minutes.',
  'auth/popup-blocked':               'Popup blocked — please allow popups for this site.',
  'auth/popup-closed-by-user':        'Google sign-in cancelled. Try again.',
  'auth/network-request-failed':      'Network error — check your connection.',
  'auth/email-already-in-use':        'Email already registered — use Sign In.',
  'auth/weak-password':               'Password must be at least 6 characters.',
  'auth/account-exists-with-different-credential': 'Account exists with a different sign-in method.',
};
function fmtErr(code) {
  console.error('Auth error:', code);
  return CODES[code] || ('Error: ' + (code || 'unknown'));
}

async function login() {
  const em = document.getElementById('em').value.trim();
  const pw = document.getElementById('pw').value;
  setMsg('');
  if (!em) { setErr('Please enter your email address.'); return; }
  if (!pw) { setErr('Please enter your password.'); return; }
  loginBtn.disabled = true;
  setMsg('Signing in…');
  try {
    await firebase.auth().signInWithEmailAndPassword(em, pw);
    // onAuthStateChanged will handle redirect
  } catch(e) {
    setErr(fmtErr(e.code));
    loginBtn.disabled = false;
  }
}

async function glogin() {
  setMsg('Opening Google sign-in…');
  try {
    const p = new firebase.auth.GoogleAuthProvider();
    p.setCustomParameters({ prompt: 'select_account' });
    await firebase.auth().signInWithPopup(p);
    // onAuthStateChanged handles redirect
  } catch(e) {
    setErr(fmtErr(e.code));
  }
}

async function resetPw() {
  const em = document.getElementById('em').value.trim();
  if (!em) { setErr('Enter your email address above, then click this button.'); return; }
  try {
    await firebase.auth().sendPasswordResetEmail(em);
    setOk('Reset email sent to ' + em + '. Check your inbox, click the link, enter a new password, then come back and sign in.');
  } catch(e) {
    setErr(fmtErr(e.code));
  }
}
</script>
</body>
</html>
