<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Crestechnologies — Secure Portal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-app-compat.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-auth-compat.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-firestore-compat.min.js"></script>

    <script>
        // 1. Structured Logging for forensic visibility
        const AuthLogger = {
            log: (action, status, detail = '') => console.log(`[Auth:${action}] ${status}`, detail),
            error: (action, error) => console.error(`[Auth:${action}] FAILED`, { code: error.code, message: error.message })
        };

        const AuthEngine = {
            // INSERT YOUR CONFIGURATION HERE
            _cfg: {
                apiKey: "AIzaSyAiQ7q1qbwx1i_qjVFaTSJIeb9yneMT21U",
                authDomain: "solarappform.firebaseapp.com",
                projectId: "solarappform",
                storageBucket: "solarappform.firebasestorage.app",
                messagingSenderId: "298700249528",
                appId: "1:298700249528:web:85f6a70780da9479f1174d"
            },
            
            init() {
                try {
                    if (!firebase.apps.length) {
                        firebase.initializeApp(this._cfg);
                        AuthLogger.log('initializeApp', 'SUCCESS');
                    }
                    
                    window._auth = firebase.auth();
                    
                    // FIXED: Using string literal 'local' to avoid compatibility collisions
                    window._auth.setPersistence('local')
                        .then(() => AuthLogger.log('setPersistence', 'SUCCESS', 'local'))
                        .catch(e => AuthLogger.error('setPersistence', e));
                    
                    window._auth.onAuthStateChanged(user => {
                        AuthLogger.log('onAuthStateChanged', user ? 'SIGNED_IN' : 'SIGNED_OUT', user?.email);
                    });
                } catch (e) {
                    AuthLogger.error('Initialization', e);
                }
            },

            async googleSignIn() {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    AuthLogger.log('signInWithPopup', 'INITIATING');
                    await window._auth.signInWithPopup(provider);
                } catch (e) {
                    AuthLogger.error('signInWithPopup', e);
                    throw e; 
                }
            }
        };

        // Execution Check
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof firebase === 'undefined') {
                console.error('CRITICAL: Firebase SDK failed to load.');
            } else {
                AuthEngine.init();
            }
        });
    </script>
</head>
<body>
    <div style="font-family:sans-serif; text-align:center; padding-top:50px;">
        <h1>Crestechnologies Portal</h1>
        <button onclick="AuthEngine.googleSignIn()" style="padding:10px 20px; cursor:pointer;">
            Sign in with Google
        </button>
    </div>
</body>
</html>
